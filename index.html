	<script>
		document.addEventListener('DOMContentLoaded', function () {
			// Carousel
			function initCarousel() {
				if (typeof Swiper === 'undefined') return;
				var carouselEl = document.querySelector('.elementor-image-carousel-wrapper');
				if (carouselEl && !carouselEl.swiper) {
					new Swiper(carouselEl, {
						slidesPerView: 1, spaceBetween: 20, loop: true, speed: 500,
						autoplay: { delay: 2500, disableOnInteraction: false },
						pagination: { el: '.swiper-pagination', clickable: true },
						navigation: { nextEl: '.elementor-swiper-button-next', prevEl: '.elementor-swiper-button-prev' },
						breakpoints: { 768: { slidesPerView: 2 }, 1025: { slidesPerView: 3 } }
					});
				}
			}
			if (typeof Swiper !== 'undefined') { initCarousel(); }
			else { var i = setInterval(function(){ if(typeof Swiper!=='undefined'){initCarousel();clearInterval(i);}}, 500); }

			// Accordion
			document.querySelectorAll('.elementor-tab-title').forEach(function(title) {
				title.addEventListener('click', function(e) {
					e.preventDefault();
					this.classList.toggle('elementor-active');
					var contentId = this.getAttribute('aria-controls');
					var content = document.getElementById(contentId) || this.nextElementSibling;
					if (content) {
						if (content.style.display === 'block') { content.style.display = 'none'; content.classList.remove('active'); }
						else { content.style.display = 'block'; content.classList.add('active'); }
					}
				});
			});

			// Lazy load fix
			document.querySelectorAll('.e-con.e-parent').forEach(function(el){ el.classList.add('e-lazyloaded'); });
		});
	<\/script>
